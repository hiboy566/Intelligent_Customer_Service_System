### Qwen3-VL-8B base model + train-v1 LoRA adapter evaluation

### model
model_name_or_path: /model/ModelScope/Qwen/Qwen3-VL-8B-Instruct
adapter_name_or_path: ./artifacts/qwen3-vl-8b/qlora/train-v1
quantization_bit: 4
quantization_method: bnb
quantization_type: nf4
double_quantization: true
trust_remote_code: true
flash_attn: sdpa
image_max_pixels: 262144
video_max_pixels: 16384

### method
stage: sft
do_predict: true
finetuning_type: lora

### dataset
dataset_dir: ./datasets
eval_dataset: customer_service_validation
template: qwen3_vl_nothink
cutoff_len: 512
max_samples: 100
overwrite_cache: true
preprocessing_num_workers: 4
dataloader_num_workers: 0

### output
output_dir: ./artifacts/qwen3-vl-8b/qlora/eval-v1
overwrite_output_dir: true
report_to: none

### evaluation
per_device_eval_batch_size: 1
predict_with_generate: true
bf16: true
ddp_timeout: 180000000

### generation
do_sample: false
max_new_tokens: 256
repetition_penalty: 1.0
skip_special_tokens: true
