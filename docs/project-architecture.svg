<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="2400" viewBox="0 0 2400 2400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef4fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#17324d" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#44627f"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#23856b"/>
    </marker>
    <style>
      .title { font: 700 54px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #16324f; }
      .subtitle { font: 400 25px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #60768b; }
      .group-title { font: 700 28px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #29465f; }
      .node-title { font: 700 25px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #17324d; text-anchor: middle; }
      .node-sub { font: 400 19px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #516b82; text-anchor: middle; }
      .small { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #38536c; text-anchor: middle; }
      .edge-label { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #49657f; text-anchor: middle; }
      .edge { fill: none; stroke: #44627f; stroke-width: 4; marker-end: url(#arrow); }
      .edge-green { fill: none; stroke: #23856b; stroke-width: 4; marker-end: url(#arrowGreen); }
      .edge-dash { fill: none; stroke: #23856b; stroke-width: 4; stroke-dasharray: 12 10; marker-end: url(#arrowGreen); }
      .group { stroke-width: 3; rx: 28; }
      .node { stroke-width: 3; rx: 20; filter: url(#shadow); }
    </style>
  </defs>

  <rect width="2400" height="2400" fill="url(#bg)"/>
  <g transform="translate(0 450)">
  <text x="1200" y="78" class="title" text-anchor="middle">智能客服系统项目架构</text>
  <text x="1200" y="120" class="subtitle" text-anchor="middle">Mastra 编排：模型首次判断 → Tool 执行 → Tool Result → 模型二次整理</text>

  <!-- Online serving groups -->
  <rect x="55" y="155" width="1040" height="810" class="group" fill="#f4f8ff" stroke="#9db9d5"/>
  <text x="90" y="205" class="group-title">本地 Agent 应用</text>

  <rect x="1130" y="155" width="1215" height="810" class="group" fill="#f1fbf7" stroke="#8fc8b4"/>
  <text x="1165" y="205" class="group-title">远程 GPU 推理服务器 · RTX 4090</text>

  <!-- Main request path -->
  <rect x="95" y="265" width="210" height="125" class="node" fill="#ffffff" stroke="#8aa9c7"/>
  <text x="200" y="318" class="node-title">用户</text>
  <text x="200" y="354" class="node-sub">浏览器 / API 客户端</text>

  <rect x="385" y="265" width="245" height="125" class="node" fill="#eaf3ff" stroke="#5d91c3"/>
  <text x="507" y="315" class="node-title">Mastra Studio</text>
  <text x="507" y="351" class="node-sub">localhost:4111</text>

  <rect x="710" y="265" width="295" height="125" class="node" fill="#dfeeff" stroke="#3e7cb5"/>
  <text x="857" y="315" class="node-title">Customer Service Agent</text>
  <text x="857" y="351" class="node-sub">意图识别 · 工具编排 · SSE</text>

  <rect x="1175" y="265" width="240" height="125" class="node" fill="#fff7df" stroke="#d19b32"/>
  <text x="1295" y="315" class="node-title">SSH 安全隧道</text>
  <text x="1295" y="351" class="node-sub">本地 18000 → 远程 8000</text>

  <rect x="1490" y="265" width="270" height="125" class="node" fill="#e4f7ef" stroke="#3c9c79"/>
  <text x="1625" y="315" class="node-title">FastAPI 服务</text>
  <text x="1625" y="351" class="node-sub">OpenAI 兼容接口 · SSE</text>

  <rect x="1835" y="245" width="430" height="165" class="node" fill="#d9f3e8" stroke="#23856b"/>
  <text x="2050" y="298" class="node-title">PyTorch ModelRuntime</text>
  <text x="2050" y="336" class="node-sub">Qwen3-VL-8B-Instruct</text>
  <text x="2050" y="368" class="node-sub">4-bit NF4 + PEFT LoRA Adapter</text>

  <!-- ① User request and ⑧ final response -->
  <path d="M305 305 H385" class="edge"/>
  <path d="M630 305 H710" class="edge"/>
  <path d="M710 365 H630" class="edge"/>
  <path d="M385 365 H305" class="edge"/>
  <text x="507" y="242" class="edge-label">① 用户问题 →</text>
  <text x="507" y="435" class="edge-label">← ⑧ 最终回复</text>

  <!-- ②/⑥ model requests and ③/⑦ model responses -->
  <path d="M1005 295 C1065 235 1115 235 1175 295" class="edge"/>
  <path d="M1415 295 H1490" class="edge-green"/>
  <path d="M1760 295 H1835" class="edge-green"/>
  <path d="M1835 365 H1760" class="edge-green"/>
  <path d="M1490 365 H1415" class="edge-green"/>
  <path d="M1175 365 C1115 445 1065 445 1005 365" class="edge"/>
  <text x="830" y="215" class="edge-label">②/⑥ 请求模型（第二次携 Tool Result）</text>
  <text x="1295" y="435" class="edge-label">③ Tool Call / ⑦ 最终答案</text>

  <!-- Tools branch -->
  <path d="M805 390 V500" class="edge"/>
  <path d="M940 500 V390" class="edge"/>
  <text x="735" y="465" class="edge-label">④ Tool Call</text>
  <text x="975" y="465" class="edge-label">⑤ Tool Result</text>
  <rect x="180" y="500" width="825" height="260" class="node" fill="#ffffff" stroke="#87a8c7"/>
  <text x="592" y="545" class="node-title">Mastra Tools</text>

  <rect x="215" y="585" width="170" height="105" rx="16" fill="#edf5ff" stroke="#79a0c6" stroke-width="2"/>
  <text x="300" y="627" class="small">订单查询</text>
  <text x="300" y="657" class="node-sub">Order Tool</text>

  <rect x="410" y="585" width="170" height="105" rx="16" fill="#edf5ff" stroke="#79a0c6" stroke-width="2"/>
  <text x="495" y="627" class="small">物流查询</text>
  <text x="495" y="657" class="node-sub">Logistics Tool</text>

  <rect x="605" y="585" width="170" height="105" rx="16" fill="#edf5ff" stroke="#79a0c6" stroke-width="2"/>
  <text x="690" y="627" class="small">退款申请</text>
  <text x="690" y="657" class="node-sub">Refund Tool</text>

  <rect x="800" y="585" width="170" height="105" rx="16" fill="#edf5ff" stroke="#79a0c6" stroke-width="2"/>
  <text x="885" y="627" class="small">创建工单</text>
  <text x="885" y="657" class="node-sub">Ticket Tool</text>

  <rect x="365" y="815" width="455" height="110" class="node" fill="#fff4e7" stroke="#d4974c"/>
  <text x="592" y="858" class="node-title">Mock 业务后端</text>
  <text x="592" y="894" class="node-sub">localhost:8001 · 订单 / 物流 / 退款 / 工单</text>
  <path d="M540 760 V815" class="edge"/>
  <path d="M645 815 V760" class="edge"/>
  <text x="505" y="797" class="edge-label">业务请求</text>
  <text x="695" y="797" class="edge-label">业务结果</text>

  <!-- Runtime internals -->
  <rect x="1240" y="510" width="290" height="120" class="node" fill="#ffffff" stroke="#78b69d"/>
  <text x="1385" y="558" class="node-title">AutoProcessor</text>
  <text x="1385" y="593" class="node-sub">对话模板与 Tokenize</text>

  <rect x="1600" y="510" width="300" height="120" class="node" fill="#ffffff" stroke="#78b69d"/>
  <text x="1750" y="558" class="node-title">量化基座模型</text>
  <text x="1750" y="593" class="node-sub">BitsAndBytes · NF4</text>

  <rect x="1970" y="510" width="300" height="120" class="node" fill="#ffffff" stroke="#78b69d"/>
  <text x="2120" y="558" class="node-title">LoRA Adapter</text>
  <text x="2120" y="593" class="node-sub">artifacts/.../train-v1</text>

  <rect x="1600" y="735" width="300" height="120" class="node" fill="#d8f2e7" stroke="#23856b"/>
  <text x="1750" y="785" class="node-title">CUDA 推理</text>
  <text x="1750" y="821" class="node-sub">约 9.1 GB 显存</text>

  <path d="M1625 390 C1625 450 1385 445 1385 510" class="edge-green"/>
  <path d="M2050 410 C2050 455 1750 455 1750 510" class="edge-green"/>
  <path d="M2050 410 C2050 455 2120 455 2120 510" class="edge-green"/>
  <path d="M1385 630 C1385 700 1600 700 1680 735" class="edge-green"/>
  <path d="M1750 630 V735" class="edge-green"/>
  <path d="M2120 630 C2120 700 1900 700 1820 735" class="edge-green"/>

  <!-- Offline training -->
  <rect x="55" y="1010" width="2290" height="415" class="group" fill="#fffaf0" stroke="#d8b56a"/>
  <text x="90" y="1060" class="group-title">离线训练、评测与版本记录</text>

  <rect x="110" y="1135" width="300" height="135" class="node" fill="#ffffff" stroke="#c9a655"/>
  <text x="260" y="1183" class="node-title">客服数据集</text>
  <text x="260" y="1220" class="node-sub">Smoke / Train / Validation</text>

  <rect x="500" y="1135" width="300" height="135" class="node" fill="#ffffff" stroke="#c9a655"/>
  <text x="650" y="1183" class="node-title">LLaMA-Factory</text>
  <text x="650" y="1220" class="node-sub">QLoRA SFT · YAML 配置</text>

  <rect x="890" y="1135" width="300" height="135" class="node" fill="#fff2cc" stroke="#c99325"/>
  <text x="1040" y="1183" class="node-title">4-bit NF4 训练</text>
  <text x="1040" y="1220" class="node-sub">远程 GPU · Checkpoint</text>

  <rect x="1280" y="1135" width="300" height="135" class="node" fill="#fff2cc" stroke="#c99325"/>
  <text x="1430" y="1183" class="node-title">评测集验证</text>
  <text x="1430" y="1220" class="node-sub">Base + LoRA Adapter</text>

  <rect x="1670" y="1135" width="300" height="135" class="node" fill="#ffffff" stroke="#c9a655"/>
  <text x="1820" y="1183" class="node-title">训练产物</text>
  <text x="1820" y="1220" class="node-sub">Adapter / 指标 / 日志</text>

  <rect x="2060" y="1135" width="230" height="135" class="node" fill="#f2edff" stroke="#8e79bc"/>
  <text x="2175" y="1183" class="node-title">Git 仓库</text>
  <text x="2175" y="1220" class="node-sub">训练记录与版本</text>

  <path d="M410 1202 H500" class="edge"/>
  <path d="M800 1202 H890" class="edge"/>
  <path d="M1190 1202 H1280" class="edge"/>
  <path d="M1580 1202 H1670" class="edge"/>
  <path d="M1970 1202 H2060" class="edge"/>
  <path d="M1820 1135 C1820 1015 2120 1015 2120 630" class="edge-dash"/>
  <text x="2025" y="1000" class="edge-label">部署 Adapter</text>

  <!-- Legend -->
  <rect x="100" y="1350" width="25" height="25" rx="5" fill="#dfeeff" stroke="#3e7cb5"/>
  <text x="145" y="1370" class="subtitle">本地 Agent</text>
  <rect x="350" y="1350" width="25" height="25" rx="5" fill="#d9f3e8" stroke="#23856b"/>
  <text x="395" y="1370" class="subtitle">真实远程模型</text>
  <rect x="690" y="1350" width="25" height="25" rx="5" fill="#fff4e7" stroke="#d4974c"/>
  <text x="735" y="1370" class="subtitle">Mock 业务数据</text>
  </g>
</svg>
